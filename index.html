<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join - Login</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./styles/startseite.css">   
    <script src="../scripts/login.js" defer></script>
</head>

<body>
    <aside>
        <div class="aside-logo"> <img src="../assets/img/join_logo.svg" alt="joinlogo"> </div>
    </aside>
    <div class="wrapper">
        <header>
            <p>Not a Join user?</p> <button  id="sign-up-button" class="sign-up-button">Sign up</button>
        </header>
        <main>
            <form id="login-form">
                <h1>Log in</h1>
                <div class="seperator"></div>
                <div class="input"> <input type="email" placeholder="Email" required> <input type="password"
                        placeholder="Password" required> </div>
                <div class="checkbox-remember"> <input type="checkbox">
                    <p>Remember me</p> <a href="#">Forgot my password</a>
                </div>
                <div class="login"> 
                    <button type="submit" class="log-in-button">Log in</button>
                    <button type="button" class="guest-log-inbutton">Guest Log in</button>
                </div>
            </form>
        </main>
    </div>
</body>

</html>
