<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="contacts.css" />
    <link rel="stylesheet" href="./contact-dialog.css">
    <script src="./contacts-template.js"></script>
    <script src="./contacts.js"></script>
  </head>
  <body onload="renderContacts()">
    <!-- Sidenavigation -->
    <aside>
      <div class="aside-logo">
        <img
          src="./assets/img/nymixart-letter-1442853_640.png"
          alt="joinlogo"
        />
      </div>
      <nav class="navigation">
        <a href="#">Summary</a>
        <a href="index.html">Board</a>
        <a href="task.html">Add Task</a>
        <a href="#">Contacts</a>
      </nav>
      <footer class="aside-footer">
        <a href="#">Legal Notice</a>
      </footer>
    </aside>
    <div class="contact-container">
      <button class="add-btn" onclick="openAddContactDialog()">
        Add new contact +
      </button>
      <div id="contact-list"></div>
    </div>
    <div class="details">
      <div class="details-header">
        <h1>Contacts</h1>
        <span class="subtitle">Better with a team</span>
      </div>
      <div id="contact-details"></div>
    </div>
    <dialog id="addContactDialog" closedby="any">
      <div class="dialog">
        <div class="dialog-left">
          <img src="./assets/img/contacts/join-logo.svg" class="logo" />
          <h1>Add contact</h1>
          <p>Tasks are better with a team!</p>
          <div class="underline"></div>
        </div>
        <div class="dialog-right">
          <img class="avatar-profile" src="./assets/img/contacts/avatar-profile.svg"></img>
          <div class="actions">
            <button class="close-btn" onclick="closeDialog(this)">✕</button>
            <form onsubmit="handleAddContact(event)">
             <input id="nameInput" type="text" placeholder="Name" required />
             <input id="emailInput" type="email" placeholder="Email" required />
              <input id="phoneInput" type="tel" placeholder="Phone" required />
              <div class="action-btns">
                <button type="button" class="cancel-btn" onclick="closeDialog(this)"> Cancel ✕</button>
                <button type="submit" class="create-btn">Create contact ✔</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </dialog>
        <dialog id="editContactDialog" closedby="any">
    </dialog>
  </body>
</html>
