<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join 360 - Summary</title>
    <link rel="stylesheet" href="style.css" />

    <link rel="stylesheet" href="summary.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-top">
                <div class="logo-wrap">
                    <img src="./img/join_logo_white.svg" alt="Join Logo" class="logo" />
                </div>

                <nav class="sidebar-nav">
                    <a href="#" class="nav-link active">
                        <span class="nav-icon"><img src="./assets/img/sumarry_icon.svg" alt=""></span>
                        <span>Summary</span>
                    </a>

                </nav>
            </div>

            <div class="sidebar-bottom">
                <a href="#">Privacy Policy</a>
                <a href="#">Legal notice</a>
            </div>
        </aside>

        <!-- Main -->
        <div class="main">
            <!-- Topbar -->
            <header class="topbar">
                <div class="topbar-title">Kanban Project Management Tool</div>

                <div class="topbar-right">
                    <div class="help">?</div>
                    <div class="profile">SM</div>
                </div>
            </header>

            <!-- Content -->
            <main class="content">
                <section class="headline-row">
                    <h1>Join 360</h1>
                    <div class="divider"></div>
                    <p>Key Metrics at a Glance</p>
                </section>

                <section class="summary-layout">
                    <!-- Left cards -->
                    <div class="cards-grid">
                        <div class="card small-card">
                            <div class="card-icon dark-circle">✎</div>
                            <div class="card-text">
                                <h2>1</h2>
                                <span>To-do</span>
                            </div>
                        </div>

                        <div class="card small-card">
                            <div class="card-icon dark-circle">✓</div>
                            <div class="card-text">
                                <h2>1</h2>
                                <span>Done</span>
                            </div>
                        </div>

                        <div class="card urgent-card">
                            <div class="urgent-left">
                                <div class="card-icon orange-circle">⌃⌃</div>
                                <div class="card-text">
                                    <h2>1</h2>
                                    <span>Urgent</span>
                                </div>
                            </div>

                            <div class="card-separator"></div>

                            <div class="urgent-right">
                                <h3 id="current-date"></h3>
                                <p>Upcoming Deadline</p>
                            </div>
                        </div>

                        <div class="bottom-cards">
                            <div class="card bottom-card">
                                <h2>5</h2>
                                <span>Tasks in Board</span>
                            </div>

                            <div class="card bottom-card active-progress">
                                <h2>2</h2>
                                <span>Tasks In Progress</span>
                            </div>

                            <div class="card bottom-card">
                                <h2>2</h2>
                                <span>Awaiting Feedback</span>
                            </div>
                        </div>
                    </div>

                    <!-- Right greeting -->
                    <div class="greeting">
                        <p>Good morning,</p>
                        <h2>Ihr Lieben!😉✌️</h2>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <script src="./summary.js"></script>
</body>

</html>
