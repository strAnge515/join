<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join</title>
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="../styles/sidebar.css" />
    <link rel="stylesheet" href="../styles/task.css" />
    <link rel="stylesheet" href="../styles/header.css" />

    <script defer src="../scripts/auth-guard.js"></script>
    <script defer src="../scripts/sidebar.js"></script>
    <script defer src="../scripts/header.js"></script>
    <script type="module" defer src="../scripts/tasks.js"></script>
  </head>

  <body>
    <div id="sidebar-container"></div>
    <div id="header-container"></div>
    <main class="main-content">
      <h1 class="main-title">Add Task</h1>

      <form class="task-form" id="task-form">
        <section class="wrapper-add-task">
          <section class="wrapper-add-task-left-side">
            <div class="form-group">
              <label class="task-form-label" for="task-title">
                <p>Title</p>
                <p class="star">*</p>
              </label>
              <input class="task-form-input flex-center-space-between" type="text" id="task-title" placeholder="Enter a title" required />
            </div>

            <div class="form-group">
              <label class="task-form-label" for="task-description">
                <p>Description</p>
              </label>
              <textarea class="task-form-textarea" id="task-description" placeholder="Enter a description"></textarea>
              <img id="resize" class="resize-img" src="../assets/img/Recurso 1 1.svg" alt="resizefield" />
            </div>

            <div class="form-group">
              <label class="task-form-label">
                <p>Due date</p>
                <p class="star">*</p>
              </label>
              <section class="task-form-input" id="task-date">
                <div class="input-wrapper">
                  <input class="date-input-field" type="text" placeholder="dd" maxlength="2" size="2" />
                  <span>/</span>
                  <input class="date-input-field" type="text" placeholder="mm" maxlength="2" size="2" />
                  <span>/</span>
                  <input class="date-input-field" type="text" placeholder="yyyy" maxlength="4" size="4" />
                </div>
                <img src="../assets/img/event.svg" alt="eventsvg" />

                <input class="old-calender" type="date" id="date-input" />
              </section>
            </div>
          </section>

          <div class="add-task-seperator"></div>
          <section class="wrapper-add-task-right-side">
            <div class="form-group">
              <label class="task-form-label">Priority</label>
              <div class="task-form-prio-group" id="prio-group">
                <button type="button" class="prio-btn prio-btn--urgent" data-prio="urgent">Urgent<img src="../assets/img/Property 1=Urgent.svg" alt="urgendimg" /></button>
                <button type="button" class="prio-btn prio-btn--medium selected-medium" data-prio="medium">Medium<img src="../assets/img/Property 1=Medium.svg" alt="mediumimg" /></button>
                <button type="button" class="prio-btn prio-btn--low" data-prio="low">Low<img src="../assets/img/Property 1=Low.svg" alt="lowimg" /></button>
              </div>
            </div>

            <section class="form-group form-group--full">
              <label class="task-form-label">Assigned to</label>
              <div class="assigned-dropdown">
                <div class="task-form-input flex-center-space-between assigned-to" id="assigned-toggle">
                  <input id="assigned-placeholder" placeholder="Select contacts to assign" class="input-assigned-to" />
                  <img src="../assets/img/arrow_drop_downaa.svg" alt="arrow-down" id="arrow-down-assignet-to" class="arrow-img" />
                  <img src="../assets/img/arrow_drop_down.svg" alt="arrow-up" id="arrow-up-assigned-to" class="d-none arrow-img" />
                </div>
                <ul class="assigned-options d-none" id="assigned-options"></ul>
              </div>
              <div class="assigned-avatars" id="assigned-avatars"></div>
            </section>

            <section class="form-group">
              <p>Category <span class="star">*</span></p>
              <div id="task-category">
                <div class="task-form-input flex-center-space-between task-form-select category" id="selected-category" data-value="">
                  <p>Select task category</p>
                  <img src="../assets/img/arrow_drop_downaa.svg" alt="arrow-down" id="arrow-down-category" class="arrow-img" />
                  <img src="../assets/img/arrow_drop_down.svg" alt="arrow-up" id="arrow-up-category" class="d-none arrow-img" />
                </div>
                <div class="dropdown-options d-none" id="category-options">
                  <button type="button" class="dropdown-option" value="technical-task">
                    <p>Technical Task</p>
                  </button>
                  <button type="button" class="dropdown-option" value="user-story">
                    <p>User Story</p>
                  </button>
                </div>
              </div>
            </section>

            <section class="form-group">
              <label class="task-form-label">Subtasks</label>
              <div class="task-form-subtask-input-row">
                <input class="task-form-input" type="text" id="subtask-input" placeholder="Add new subtask" />
                <div class="d-none" id="subtask-button-wrapper">
                  <button type="button" class="subtask-button" id="btn-delete-subtask">
                    <img src="../assets/img/Property 1=close.svg" alt="closeicon" />
                  </button>
                  <div class="subtask-button-separator"></div>
                  <button type="button" class="subtask-button" id="btn-add-subtask">
                    <img src="../assets/img/Property 1=check.svg" alt="checkicon" />
                  </button>
                </div>
              </div>
              <ul class="task-form-subtask-list" id="subtask-list"></ul>
            </section>
          </section>
        </section>
        <section class="task-form-actions">
          <div>
            <p class="star">*</p>
            <p>This field is required</p>
          </div>
          <div>
            <button type="button" class="btn btn--secondary" id="btn-clear">Clear ✕</button>
            <button type="button" class="btn btn--primary" id="btn-create">Create Task ✓</button>
          </div>
        </section>
      </form>
    </main>
  </body>
</html>
