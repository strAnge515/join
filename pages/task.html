<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join</title>
    <link rel="stylesheet" href="../styles/sidebar.css">
    <link rel="stylesheet" href="../styles/task.css">
    <link rel="stylesheet" href="../styles/header.css">
    
   
    <script defer src="../scripts/sidebar.js"></script>
    <script defer src="../scripts/header.js"></script>
    <script defer src="../scripts/tasks.js"></script>

</head>

<body>

  
  <div id="sidebar-container"></div>
  <div id="header-container"></div>

    <main class="main" style="margin-left: 232px; margin-top: 80px;">
    <h1 class="main-title">Add Task</h1>
 
    <form class="task-form" id="task-form">
 
      <!-- Title -->
      <div class="form-group">
        <label class="task-form-label" for="task-title">Title</label>
        <input class="task-form-input" type="text" id="task-title" placeholder="Enter a title" />
      </div>
 
      <!-- Due Date -->
      <div class="form-group">
        <label class="task-form-label" for="task-date">Due date</label>
        <input class="task-form-input" type="date" id="task-date" />
      </div>
 
      <!-- Description -->
      <div class="form-group">
        <label class="task-form-label" for="task-description">Description</label>
        <textarea class="task-form-textarea" id="task-description" placeholder="Enter a description"></textarea>
      </div>
 
      <!-- Prio -->
      <div class="form-group">
        <label class="task-form-label">Prio</label>
        <div class="task-form-prio-group" id="prio-group">
          <button type="button" class="prio-btn prio-btn--urgent" data-prio="urgent">🔴 Urgent</button>
          <button type="button" class="prio-btn prio-btn--medium" data-prio="medium">🟡 Medium</button>
          <button type="button" class="prio-btn prio-btn--low"    data-prio="low">🟢 Low</button>
        </div>
      </div>
 
      <!-- Category -->
      <div class="form-group">
        <label class="task-form-label" for="task-category">Category</label>
        <select class="task-form-select" id="task-category">
          <option value="">Select task category</option>
          <option value="technical-task">Technical Task</option>
          <option value="user-story">User Story</option>
        </select>
      </div>
 
      <!-- Subtasks -->
      <div class="form-group">
        <label class="task-form-label">Subtasks</label>
        <div class="task-form-subtask-input-row">
          <input class="task-form-input" type="text" id="subtask-input" placeholder="Add new subtask" />
          <button type="button" class="btn-add-subtask" id="btn-add-subtask">+</button>
        </div>
        <ul class="task-form-subtask-list" id="subtask-list"></ul>
      </div>
 
      <!-- Assigned To -->
      <div class="form-group form-group--full">
        <label class="task-form-label" for="task-assigned">Assigned to</label>
        <select class="task-form-select" id="task-assigned" multiple size="4">
          <option value="denny">Denny</option>
          <option value="max">Max</option>
          <option value="ina">Ina</option>
        </select>
      </div>
 
      <!-- Actions -->
      <div class="task-form-actions">
        <button type="button" class="btn btn--secondary" id="btn-clear">Clear ✕</button>
        <button type="button" class="btn btn--primary"  id="btn-create">Create Task ✓</button>
      </div>
 
    </form>
  </main>
</body>
