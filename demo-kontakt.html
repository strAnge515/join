<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join - Ruslan Kontakt Backend Test</title>
    
    <link rel="icon" type="image/svg+xml" href="./assets/img/favicon.svg">
    
    <link rel="stylesheet" href="./styles/sidebar.css">
    <link rel="stylesheet" href="./styles/header.css">

    <script defer src="./scripts/sidebar.js"></script>
    <script defer src="./scripts/header.js"></script>
    <script type="module" src="./demo-kontakt.js"></script>

    <style>
        body { margin: 0; display: flex; font-family: 'Inter', sans-serif; background-color: #f6f7f8; min-height: 100vh; }
        .main-content { margin-left: 232px; flex: 1; padding: 40px; margin-top: 80px; }
        .test-section { background: white; padding: 20px; border-radius: 8px; margin-bottom: 30px; border: 1px solid #ccc; }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px;}
        input { width: 100%; max-width: 400px; padding: 8px; font-family: 'Inter', sans-serif; border: 1px solid #ccc; border-radius: 4px;}
        button[type="submit"] { padding: 10px 15px; cursor: pointer; background: #2a3647; color: white; border: none; border-radius: 5px; margin-top: 10px;}
        button.delete-btn { background: #ff3d00; margin-top: 10px; padding: 8px 12px; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .contact-card-test { border: 1px solid #ccc; padding: 15px; margin-bottom: 15px; border-radius: 8px; background: white; display: flex; align-items: center; gap: 20px; position: relative;}
        .contact-icon { width: 60px; height: 60px; border-radius: 50%; background-color: #ff7a00; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px;}
        .contact-details h3 { margin: 0 0 5px 0; font-size: 18px;}
        .contact-details p { margin: 2px 0; color: #555; font-size: 14px;}
        .contact-actions { position: absolute; top: 15px; right: 15px;}
    </style>
</head>
<body>

    <div id="sidebar-container"></div>
    <div id="header-container"></div>

    <main class="main-content">
        <h1>Kontakt-Backend & UI Testbereich</h1>
        
        <div class="test-section">
            <h2>1. Neuen Kontakt erstellen</h2>
            <form id="test-contact-form">
                <div class="form-group">
                    <label>Vor- und Nachname:</label>
                    <input type="text" id="contact-name" required placeholder="z.B. Anton Mayer">
                </div>
                <div class="form-group">
                    <label>Email-Adresse:</label>
                    <input type="email" id="contact-email" required placeholder="z.B. anton@gmail.com">
                </div>
                <div class="form-group">
                    <label>Telefonnummer:</label>
                    <input type="tel" id="contact-phone" required placeholder="z.B. +49 1111 111 11 1">
                </div>
                
                <button type="submit">Create Contact in Firebase speichern</button>
            </form>
        </div>

        <div class="test-section">
            <h2>2. Kontaktliste (Live aus Firebase)</h2>
            <div id="contact-list-container">
                <p>Lade Daten...</p>
            </div>
        </div>

    </main>

</body>
</html>
