<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join - Ruslan UI & Backend Test</title>
    
    <link rel="icon" type="image/svg+xml" href="./assets/img/favicon.svg">
    
    <link rel="stylesheet" href="./styles/sidebar.css">
    <link rel="stylesheet" href="./styles/header.css">

    <script defer src="./scripts/sidebar.js"></script>
    <script defer src="./scripts/header.js"></script>
    <script type="module" src="./demo.js"></script>

    <style>
        body { margin: 0; display: flex; font-family: 'Inter', sans-serif; background-color: #f6f7f8; min-height: 100vh; }
        .main-content { margin-left: 232px; flex: 1; padding: 40px; margin-top: 80px; }
        .test-section { background: white; padding: 20px; border-radius: 8px; margin-bottom: 30px; border: 1px solid #ccc; }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px;}
        input, select, textarea { width: 100%; max-width: 400px; padding: 8px; font-family: 'Inter', sans-serif; border: 1px solid #ccc; border-radius: 4px;}
        button[type="submit"] { padding: 10px 15px; cursor: pointer; background: #2a3647; color: white; border: none; border-radius: 5px; margin-top: 10px;}
        button.delete-btn { background: #ff3d00; margin-top: 10px; padding: 8px 12px; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .task-card-test { border: 2px solid #29abe2; padding: 15px; margin-bottom: 15px; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="sidebar-container"></div>
    <div id="header-container"></div>

    <main class="main-content">
        <h1>Backend & UI Testbereich</h1>
        
        <div class="test-section">
            <h2>1. Neuen Task erstellen</h2>
            <form id="test-task-form">
                <div class="form-group">
                    <label>Title:</label>
                    <input type="text" id="test-title" required placeholder="z.B. Backend testen">
                </div>
                <div class="form-group">
                    <label>Description:</label>
                    <textarea id="test-desc" placeholder="Beschreibung..."></textarea>
                </div>
                <div class="form-group">
                    <label>Due Date:</label>
                    <input type="date" id="test-date" required>
                </div>
                <div class="form-group">
                    <label>Priority:</label>
                    <select id="test-prio">
                        <option value="Urgent">Urgent 🔴</option>
                        <option value="Medium">Medium 🟡</option>
                        <option value="Low">Low 🟢</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Category:</label>
                    <select id="test-category">
                        <option value="Technical Task">Technical Task</option>
                        <option value="User Story">User Story</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Assigned to (Namen mit Komma trennen):</label>
                    <input type="text" id="test-assigned" placeholder="z.B. Ruslan, Max, Anna">
                </div>
                
                <button type="submit">Create Task in Firebase speichern</button>
            </form>
        </div>

        <div class="test-section">
            <h2>2. Gespeicherte Tasks (Live aus Firebase)</h2>
            <div id="task-list-container">
                <p>Lade Daten...</p>
            </div>
        </div>

    </main>

</body>
</html>
